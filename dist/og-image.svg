<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="white" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="white" opacity="0.1"/>
  
  <!-- Main content card -->
  <rect x="150" y="120" width="900" height="390" rx="12" fill="white" opacity="0.95"/>
  
  <!-- Icon -->
  <rect x="200" y="170" width="80" height="80" rx="8" fill="#3b82f6"/>
  <text x="240" y="225" font-size="48" font-weight="bold" fill="white" text-anchor="middle">📝</text>
  
  <!-- Main title -->
  <text x="320" y="195" font-size="54" font-weight="bold" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">
    Notes By Raheem
  </text>
  
  <!-- Subtitle -->
  <text x="320" y="240" font-size="24" fill="#64748b" font-family="system-ui, -apple-system, sans-serif">
    Organize your thoughts beautifully
  </text>
  
  <!-- Feature bullets -->
  <text x="200" y="310" font-size="18" fill="#475569" font-family="system-ui, -apple-system, sans-serif">
    ✓ Create and manage your notes effortlessly
  </text>
  <text x="200" y="360" font-size="18" fill="#475569" font-family="system-ui, -apple-system, sans-serif">
    ✓ Share knowledge with students and peers
  </text>
  <text x="200" y="410" font-size="18" fill="#475569" font-family="system-ui, -apple-system, sans-serif">
    ✓ Build your learning community today
  </text>
  
  <!-- Bottom accent -->
  <rect x="150" y="500" width="900" height="10" rx="5" fill="#3b82f6" opacity="0.3"/>
</svg>