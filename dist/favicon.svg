  <line x1="32" y1="40" x2="68" y2="40" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="55" y2="50" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="60" x2="68" y2="60" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
